services:
  backend:
    build:
      context: .
      dockerfile: src/PinterJasa.API/Dockerfile
    ports:
      - "3000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=pinterjasa;Username=postgres;Password=postgres
      - Jwt__Key=change-this-to-a-strong-secret-key-at-least-32-chars
      - Jwt__Issuer=PinterJasa
      - Jwt__Audience=PinterJasa
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pinterjasa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
